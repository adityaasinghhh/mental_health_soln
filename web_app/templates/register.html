<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MindWell AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-control {
            border-radius: 15px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: none;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.4);
        }
        .password-strength {
            height: 5px;
            border-radius: 5px;
            margin-top: 10px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="text-center mb-4">
                <i class="fas fa-brain fa-3x" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                <h2 class="mt-2">Create Account</h2>
                <p class="text-muted">Join MindWell AI for personalized insights</p>
            </div>
            <form id="registerForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="username" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                    <div id="passwordMatch" class="small mt-1"></div>
                </div>
                <button type="submit" class="btn-register">Sign Up</button>
            </form>
            <div class="text-center mt-3">
                <a href="/login">Already have an account? Login</a>
            </div>
            <hr class="my-4">
            <div class="text-center">
                <small class="text-muted">
                    <i class="fas fa-shield-alt"></i> Your data is encrypted and secure
                </small>
            </div>
        </div>
    </div>
    <script>
        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('passwordStrength');
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            
            strengthBar.className = 'password-strength';
            if (strength <= 2) {
                strengthBar.style.background = '#ef4444';
                strengthBar.style.width = '33%';
            } else if (strength <= 3) {
                strengthBar.style.background = '#f59e0b';
                strengthBar.style.width = '66%';
            } else {
                strengthBar.style.background = '#10b981';
                strengthBar.style.width = '100%';
            }
            
            checkPasswordMatch();
        });
        
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length > 0) {
                if (password === confirm) {
                    matchDiv.innerHTML = '<i class="fas fa-check-circle text-success"></i> Passwords match';
                    matchDiv.style.color = '#10b981';
                } else {
                    matchDiv.innerHTML = '<i class="fas fa-times-circle text-danger"></i> Passwords do not match';
                    matchDiv.style.color = '#ef4444';
                }
            } else {
                matchDiv.innerHTML = '';
            }
        }
        
        document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: password
                })
            });
            
            const data = await response.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                alert(data.error);
            }
        });
    </script>
</body>
</html>
