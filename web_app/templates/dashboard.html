<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MindWell AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background: white;
            min-height: 100vh;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.4);
        }
        .nav-link {
            color: #4a5568;
            padding: 10px 15px;
            border-radius: 10px;
            transition: all 0.3s;
            display: block;
            text-decoration: none;
        }
        .nav-link:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .welcome-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
        }
        .metric-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 p-0">
                <div class="sidebar">
                    <div class="text-center mb-4">
                        <i class="fas fa-brain fa-3x" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                        <h5 class="mt-2">MindWell AI</h5>
                    </div>
                    <hr>
                    <nav>
                        <a class="nav-link" href="#" onclick="location.reload()">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                        <a class="nav-link" href="/assessment">
                            <i class="fas fa-play-circle me-2"></i>New Assessment
                        </a>
                        <a class="nav-link" href="/logout">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </a>
                    </nav>
                    <hr class="mt-4">
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt"></i> Secure & Private
                        </small>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">
                <div class="stat-card">
                    <h2><i class="fas fa-chart-line me-2"></i>Your Mental Health Journey</h2>
                    <p class="text-muted">Track your progress and insights over time</p>
                </div>
                
                <div class="row" id="statsContainer">
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <i class="fas fa-clipboard-list fa-2x text-primary"></i>
                            <div class="metric-value" id="totalAssessments">0</div>
                            <p>Total Assessments</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <i class="fas fa-heart fa-2x text-danger"></i>
                            <div class="metric-value" id="latestStatus">-</div>
                            <p>Latest Status</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stat-card text-center">
                            <i class="fas fa-calendar-alt fa-2x text-info"></i>
                            <div class="metric-value" id="memberSince">-</div>
                            <p>Member Since</p>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="stat-card">
                            <h4><i class="fas fa-history me-2"></i>Recent Assessments</h4>
                            <div id="recentAssessments" class="mt-3">
                                <p class="text-muted text-center">No assessments yet. Start your first assessment!</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <button class="btn-start" onclick="window.location.href='/assessment'">
                        <i class="fas fa-play me-2"></i>Start New Assessment
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await fetch('/api/user/stats');
                const data = await response.json();
                
                if (data.has_data) {
                    document.getElementById('totalAssessments').textContent = data.total_assessments;
                    document.getElementById('latestStatus').innerHTML = data.latest.overall_status;
                    document.getElementById('memberSince').textContent = data.member_since;
                }
                
                // Load recent assessments
                const assessmentsResponse = await fetch('/api/user/assessments');
                const assessments = await assessmentsResponse.json();
                
                const recentDiv = document.getElementById('recentAssessments');
                if (assessments.length > 0) {
                    recentDiv.innerHTML = assessments.slice(0, 5).map(a => `
                        <div class="border rounded p-3 mb-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>${a.date}</strong>
                                    <div class="text-muted">Score: ${a.total_score}/80</div>
                                </div>
                                <span class="badge bg-${a.overall_status === 'Normal' ? 'success' : a.overall_status === 'Mild' ? 'warning' : 'danger'}">
                                    ${a.overall_status}
                                </span>
                            </div>
                            <div class="mt-2">
                                <small>Anxiety: ${a.anxiety_score} | Depression: ${a.depression_score} | Stress: ${a.stress_score}</small>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
