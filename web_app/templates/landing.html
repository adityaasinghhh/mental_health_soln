<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWell AI - Mental Health Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: white;
        }
        .feature-icon {
            font-size: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mb-5 mb-lg-0">
                    <h1 class="display-3 fw-bold text-white">Your Mental Health <span style="background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Matters</span></h1>
                    <p class="lead text-white-50 mb-4">AI-powered mental health assessment tool providing personalized insights and recommendations.</p>
                    <div class="d-flex gap-3">
                        <a href="/register" class="btn-gradient btn-lg">Get Started <i class="fas fa-arrow-right ms-2"></i></a>
                        <a href="/login" class="btn btn-outline-light btn-lg">Login</a>
                    </div>
                    <div class="mt-4">
                        <small class="text-white-50">
                            <i class="fas fa-shield-alt me-1"></i> 100% Confidential · Free Assessment
                        </small>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="glass-card text-center">
                        <div class="floating">
                            <i class="fas fa-brain fa-4x" style="color: #667eea;"></i>
                        </div>
                        <h3 class="mt-3">Free & Confidential Assessment</h3>
                        <div class="row mt-4">
                            <div class="col-4">
                                <div class="feature-icon mb-2">
                                    <i class="fas fa-clipboard-list"></i>
                                </div>
                                <small>16 Questions</small>
                            </div>
                            <div class="col-4">
                                <div class="feature-icon mb-2">
                                    <i class="fas fa-microphone-alt"></i>
                                </div>
                                <small>Voice Input</small>
                            </div>
                            <div class="col-4">
                                <div class="feature-icon mb-2">
                                    <i class="fas fa-chart-line"></i>
                                </div>
                                <small>AI Analysis</small>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="text-warning">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <span class="text-dark ms-2">4.9/5 rating</span>
                        </div>
                        <div class="mt-3">
                            <small class="text-muted">Trusted by 10,000+ users</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
